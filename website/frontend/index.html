<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIP-C01 Study Chat</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>AIP-C01 Study Chat</h1>
        <span id="ttft" class="badge" title="Time to first token / total time">–</span>
      </header>
      <main id="messages" aria-live="polite"></main>
      <form id="composer">
        <input
          id="input"
          type="text"
          placeholder="Ask about anything in the study guides…"
          autocomplete="off"
          maxlength="900"
        />
        <button id="send" type="submit">Send</button>
      </form>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
