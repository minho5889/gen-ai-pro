# Check suite — every push and PR. Zero AWS access by construction (CICD-SPEC).
name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 tools/consistency_check.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet ruff
      - run: ruff check .
      - run: ruff format --check .

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false -input=false
      - run: terraform validate

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/frontend/package-lock.json
      - run: npm ci --no-fund --no-audit
      - run: npx prettier --check .
      - run: npm run build

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install --quiet pytest
      - name: Unit tests (functional cores)
        run: pytest tests/ -q
      - name: Integration smoke test (SSE contract)
        run: python3 website/backend/test_smoke.py
