name: Bug report
description: Something broken in the website, agents, tooling, or CI
labels: [bug]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - website (frontend/backend/terraform)
        - agents
        - tooling / CI
        - other
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened vs what you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands, inputs, environment (OS, model, region).
